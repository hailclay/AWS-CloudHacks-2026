AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "TrailMatch backend \u2014 Lambda + API Gateway + DynamoDB"
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Environment:
      Variables:
        PREFERENCES_TABLE:
          Ref: PreferencesTable
        TRAILS_TABLE:
          Ref: TrailsTable
        RATINGS_TABLE:
          Ref: RatingsTable
        EVENTS_TABLE:
          Ref: EventsTable
        POSTS_TABLE:
          Ref: PostsTable
        TRAILS_BUCKET:
          Ref: TrailsBucket
        AUTH0_DOMAIN:
          Ref: Auth0Domain
        AUTH0_AUDIENCE:
          Ref: Auth0Audience
Parameters:
  Auth0Domain:
    Type: String
    Description: Your Auth0 domain, e.g. dev-abc123.us.auth0.com
  Auth0Audience:
    Type: String
    Description: Your Auth0 API audience identifier
Resources:
  TrailMatchApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
        - http://localhost:5173
        - http://localhost:3000
        AllowHeaders:
        - Content-Type
        - Authorization
        AllowMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
  PreferencesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: PreferencesFunction
      Handler: index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: PreferencesTable
      Events:
        GetPreferences:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /preferences
            Method: GET
        SavePreferences:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /preferences
            Method: POST
    Metadata:
      SamResourceId: PreferencesFunction
  TrailsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: TrailsFunction
      Handler: index.handler
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: TrailsTable
      - S3ReadPolicy:
          BucketName:
            Ref: TrailsBucket
      Events:
        ListTrails:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /trails
            Method: GET
        GetTrail:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /trails/{id}
            Method: GET
    Metadata:
      SamResourceId: TrailsFunction
  RatingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: RatingsFunction
      Handler: index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: RatingsTable
      Events:
        SubmitRating:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /ratings
            Method: POST
        GetTrailRatings:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /ratings/{trailId}
            Method: GET
        DeleteRating:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /ratings/{trailId}
            Method: DELETE
    Metadata:
      SamResourceId: RatingsFunction
  EventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: EventsFunction
      Handler: index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: EventsTable
      Events:
        CreateEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /events
            Method: POST
        ListEvents:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /events
            Method: GET
        GetEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /events/{id}
            Method: GET
        JoinEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /events/{id}/join
            Method: POST
        CancelEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /events/{id}
            Method: DELETE
    Metadata:
      SamResourceId: EventsFunction
  PostsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: PostsFunction
      Handler: index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: PostsTable
      - S3CrudPolicy:
          BucketName:
            Ref: TrailsBucket
      Events:
        CreatePost:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /posts
            Method: POST
        GetFeed:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /feed
            Method: GET
        GetTrailPosts:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /posts/trail/{trailId}
            Method: GET
        DeletePost:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TrailMatchApi
            Path: /posts/{id}
            Method: DELETE
    Metadata:
      SamResourceId: PostsFunction
  PreferencesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TrailMatch-Preferences
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
  TrailsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TrailMatch-Trails
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: trailId
        AttributeType: S
      KeySchema:
      - AttributeName: trailId
        KeyType: HASH
  RatingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TrailMatch-Ratings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      - AttributeName: trailId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
      - AttributeName: trailId
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: TrailRatingsIndex
        KeySchema:
        - AttributeName: trailId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TrailMatch-Events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: eventId
        AttributeType: S
      - AttributeName: trailId
        AttributeType: S
      KeySchema:
      - AttributeName: eventId
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: TrailEventsIndex
        KeySchema:
        - AttributeName: trailId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
  PostsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TrailMatch-Posts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: postId
        AttributeType: S
      - AttributeName: trailId
        AttributeType: S
      KeySchema:
      - AttributeName: postId
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: TrailPostsIndex
        KeySchema:
        - AttributeName: trailId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
  TrailsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: trailmatch-assets-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
        - AllowedOrigins:
          - http://localhost:5173
          - http://localhost:3000
          AllowedMethods:
          - GET
          - PUT
          - POST
          AllowedHeaders:
          - '*'
          MaxAge: 3000
Outputs:
  ApiUrl:
    Description: "API Gateway base URL \u2014 paste this into your frontend .env as\
      \ VITE_API_URL"
    Value:
      Fn::Sub: https://${TrailMatchApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  TrailsBucketName:
    Description: S3 bucket name for trail data and post photos
    Value:
      Ref: TrailsBucket
