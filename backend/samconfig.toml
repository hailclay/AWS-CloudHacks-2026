# samconfig.toml — SAM deploy configuration
#
# This file stores your deploy settings so you don't have to type them
# every time. Run `sam deploy` and SAM reads from here automatically.
#
# First-time setup: fill in your Auth0 values below, then run:
#   cd backend
#   sam build
#   sam deploy

version = 0.1

[default.deploy.parameters]
stack_name = "trailmatch-backend"
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
resolve_s3 = true

# Replace these with your actual Auth0 values.
# Find them in your Auth0 dashboard under Applications > APIs.
parameter_overrides = "Auth0Domain=YOUR_AUTH0_DOMAIN Auth0Audience=YOUR_AUTH0_AUDIENCE"

# Confirm before deploying (set to false to skip the prompt in CI)
confirm_changeset = true
